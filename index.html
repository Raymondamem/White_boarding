<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PPTLinks</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="shortcut icon" href="./svg.svg" type="svg/x-icon" />
  </head>
  <body>
    <div class="app">
      <header class="toolbar">
        <div class="toolbar-left">
          <h1
            class="title"
            style="display: flex; gap: 2px; align-items: center"
          >
            <img
              src="./svg.svg"
              alt="logo"
              style="width: 25px; aspect-ratio: square"
            />PPTLinks
          </h1>
          <div class="tool-group-wrapper">
            <div class="tool-group" id="toolButtons">
              <button
                class="tool-button"
                data-tool="select"
                title="Select (V)"
                aria-label="Select tool (shortcut V)"
              >
                <i data-lucide="mouse-pointer-2"></i>
              </button>
              <button
                class="tool-button"
                data-tool="pen"
                title="Pen (P or B)"
                aria-label="Pen tool (shortcut P or B)"
              >
                <i data-lucide="pencil"></i>
              </button>
              <button
                class="tool-button"
                data-tool="line"
                title="Line (L)"
                aria-label="Line tool (shortcut L)"
              >
                <i data-lucide="minus"></i>
              </button>
              <button
                class="tool-button"
                data-tool="arrow"
                title="Arrow (A)"
                aria-label="Arrow tool (shortcut A)"
              >
                <i data-lucide="move-up-right"></i>
              </button>
              <button
                class="tool-button"
                data-tool="rectangle"
                title="Rectangle (R)"
                aria-label="Rectangle tool (shortcut R)"
              >
                <i data-lucide="square"></i>
              </button>
              <button
                id="curveToggle"
                class="tool-button"
                title="Curve Mode (Ctrl)"
                aria-label="Toggle curve/bend mode"
              >
                <i data-lucide="spline"></i>
              </button>
              <button
                class="tool-button"
                data-tool="ellipse"
                title="Ellipse (O)"
                aria-label="Ellipse tool (shortcut O)"
              >
                <i data-lucide="circle"></i>
              </button>
              <button
                class="tool-button"
                data-tool="text"
                title="Text (T)"
                aria-label="Text tool (shortcut T)"
              >
                <i data-lucide="type"></i>
              </button>
              <button
                class="tool-button"
                data-tool="image"
                title="Image (I)"
                aria-label="Image tool (shortcut I)"
              >
                <i data-lucide="image"></i>
              </button>
              <button
                class="tool-button"
                data-tool="eraser"
                title="Eraser (E)"
                aria-label="Eraser tool (shortcut E)"
              >
                <i data-lucide="eraser"></i>
              </button>
              <button
                class="tool-button"
                data-tool="eraser_area"
                title="Area Eraser (Shift+E)"
                aria-label="Area Eraser tool (shortcut Shift+E)"
              >
                <i data-lucide="box-select"></i>
              </button>
            </div>
          </div>
        </div>
        <div class="toolbar-right controls">
          <div class="picker-group">
            <div class="color-picker-wrapper" title="Choose Color">
              <input type="color" id="colorPicker" value="#222222" />
              <div
                class="color-preview"
                id="colorPreview"
                style="background-color: #222222"
              ></div>
            </div>
            <div class="size-picker-wrapper">
              <div class="size-display" id="sizeValueDisplay">5</div>
              <input
                type="range"
                id="sizePicker"
                min="1"
                max="100"
                step="1"
                value="5"
              />
            </div>
          </div>
          <div class="zoom-controls">
            <button id="zoomOut" title="Zoom Out">
              <i data-lucide="zoom-out"></i>
            </button>
            <span id="zoomLevel">100%</span>
            <button id="zoomIn" title="Zoom In">
              <i data-lucide="zoom-in"></i>
            </button>
          </div>
          <button
            id="undoBtn"
            title="Undo (Ctrl+Z)"
            aria-label="Undo (shortcut Ctrl+Z)"
          >
            <i data-lucide="undo-2"></i>
          </button>
          <button
            id="redoBtn"
            title="Redo (Ctrl+Y / Ctrl+Shift+Z)"
            aria-label="Redo (shortcut Ctrl+Y or Ctrl+Shift+Z)"
          >
            <i data-lucide="redo-2"></i>
          </button>
          <button id="lockBtn" title="Lock board" aria-label="Lock board">
            <i data-lucide="lock"></i>
          </button>
          <button
            id="bgToggleBtn"
            title="Toggle Background"
            aria-label="Toggle Background"
          >
            <i data-lucide="layers"></i>
          </button>
          <button
            id="clearBtn"
            class="danger"
            title="Clear board"
            aria-label="Clear board"
          >
            <i data-lucide="trash-2"></i>
          </button>
          <button
            id="exportBtn"
            title="Export as PNG"
            aria-label="Export as PNG image"
          >
            <i data-lucide="download"></i>
          </button>
          <button id="shareBtn" title="Share image" aria-label="Share image">
            <i data-lucide="share-2"></i>
          </button>
        </div>
        <button
          class="menu-toggle"
          id="menuToggle"
          aria-label="Toggle menu"
          title="Toggle menu"
        >
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </header>
      <main class="board-wrapper">
        <div class="canvas-wrapper">
          <canvas id="board"></canvas>
        </div>
        <div id="textModal" class="text-modal">
          <div class="text-modal-content">
            <textarea
              id="textInput"
              class="text-input"
              placeholder="Enter text..."
              rows="3"
            ></textarea>
          </div>
        </div>
      </main>
      <input
        type="file"
        id="imageInput"
        accept="image/*"
        style="display: none"
      />
    </div>
    <div class="bg_img"></div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="app.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
